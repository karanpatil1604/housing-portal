# ============================================================
# Housing Portal — Full Stack
#
# DEMO (one command):
#   cp .env.example .env
#   docker compose up --build
#
# Open: http://localhost:3000
# ============================================================

services:

  # ── 1. FastAPI ML Service ─────────────────────────────────
  fastapi:
    build:
      context: ./apps/api-fastapi
      dockerfile: Dockerfile
    container_name: housing-fastapi
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - ENVIRONMENT=${ENVIRONMENT:-production}
    networks:
      - housing-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── 2. Java Spring Boot API ───────────────────────────────
  api-java:
    build:
      context: ./apps/api-java
      dockerfile: Dockerfile
    container_name: housing-api-java
    ports:
      - "${JAVA_API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - FASTAPI_BASE_URL=${FASTAPI_INTERNAL_URL:-http://fastapi:8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - housing-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ── 3. Next.js Frontend ───────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: housing-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - FASTAPI_BASE_URL=${FASTAPI_INTERNAL_URL:-http://fastapi:8000}
      - JAVA_API_BASE_URL=${JAVA_API_INTERNAL_URL:-http://api-java:8080}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      fastapi:
        condition: service_healthy
      api-java:
        condition: service_healthy
    networks:
      - housing-net
    restart: unless-stopped

networks:
  housing-net:
    driver: bridge
