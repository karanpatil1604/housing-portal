version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime          # use the final slim stage
    image: housing-price-api:latest
    container_name: housing-price-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_FORMAT=console
      - LOG_LEVEL=DEBUG
      - RETRAIN_ON_STARTUP=true
      - MAX_BATCH_SIZE=500
    volumes:
      # Persist trained model across container restarts
      - model_data:/app/models
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  model_data:
    driver: local
