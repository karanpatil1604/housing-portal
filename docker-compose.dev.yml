# ============================================================
# Development override — hot reload, no production build
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Use this when actively developing. Uses volume mounts so
# code changes reflect without rebuilding images.
# ============================================================

services:

  fastapi:
    build:
      context: ./apps/api-fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api-fastapi:/app
    # Hot reload for FastAPI
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENVIRONMENT=development
    networks:
      - housing-net

  # api-java:
  #   # Java needs a full rebuild on code change — use local mvn for dev
  #   # This just keeps the last built image running with dev config
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=docker
  #     - LOGGING_LEVEL_COM_HOUSINGPORTAL=DEBUG
  # ── 2. Java Spring Boot API ───────────────────────────────
  api-java:
    build:
      context: ./apps/api-java
      dockerfile: Dockerfile
    container_name: housing-api-java
    ports:
      - "${JAVA_API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - FASTAPI_BASE_URL=${FASTAPI_INTERNAL_URL:-http://fastapi:8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - housing-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped


  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - FASTAPI_BASE_URL=http://fastapi:8000   # ✅
      - JAVA_API_BASE_URL=http://api-java:8080
    networks:
      - housing-net

networks:
  housing-net:
    driver: bridge